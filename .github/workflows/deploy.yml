name: Deploy to Render

on:
  push:
    branches:
      - main
      - feature/lang-test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build server
        run: |
          cd server
          npm install
          npm run build

      - name: Build client
        run: |
          cd client
          npm install
          npm run build

      - name: Deploy to Render
        uses: render-examples/render-deploy-action@v1
        with:
          api-key: ${{ secrets.RENDER_API_KEY }}
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
